name: Bug report
description: Something is broken or behaves wrong
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting. The site runs entirely in your browser, so the details
        below are usually enough to reproduce it without any server logs.

  - type: textarea
    id: what-happened
    attributes:
      label: What happened
      description: What did you see, and what did you expect instead?
      placeholder: The Analyse button opened the board at move 1 instead of the final position.
    validations:
      required: true

  - type: input
    id: username
    attributes:
      label: chess.com username involved
      description: >
        Only if the bug is tied to a specific account. This is public data from
        chess.com's API, but leave it blank if you would rather not say.
      placeholder: hikaru
    validations:
      required: false

  - type: input
    id: url
    attributes:
      label: Page URL
      description: Copy it from the address bar. The `?u=` part matters.
      placeholder: https://roeibh.github.io/check-please/?u=hikaru
    validations:
      required: false

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open the site
        2. Type a username, press Enter
        3. Click Analyse on the second row
        4. Board opens at the wrong position
    validations:
      required: true

  - type: dropdown
    id: where
    attributes:
      label: Where does it happen?
      multiple: true
      options:
        - Phone
        - Tablet
        - Desktop
        - Only in dark mode
        - Only in light mode
    validations:
      required: false

  - type: input
    id: browser
    attributes:
      label: Browser and version
      placeholder: Safari 18 on iOS 18.2
    validations:
      required: false

  - type: textarea
    id: console
    attributes:
      label: Console errors
      description: >
        Open developer tools, reload, and paste anything red. Skip this if it is
        awkward on a phone; the bug report is still useful without it.
      render: text
    validations:
      required: false

  - type: checkboxes
    id: checks
    attributes:
      label: Quick checks
      options:
        - label: I tried a hard reload, and it still happens
          required: false
        - label: I searched existing issues
          required: false
